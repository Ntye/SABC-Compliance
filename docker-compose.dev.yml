# Development compose — source code is volume-mounted so changes are live.
#
# Usage:
#   First time (or after adding/removing a dependency):
#     docker compose -f docker-compose.dev.yml up --build -d
#
#   After every 'git pull' (no rebuild needed):
#     docker compose -f docker-compose.dev.yml up -d
#     (backend auto-reloads on .py changes; frontend HMR updates the browser)
#
# For production / airgap deployment use docker-compose.yml instead.

services:

  # ── Backend: FastAPI + Ansible ─────────────────────────────────────────────
  backend:
    build: ./backend          # built once — deps cached; rebuild only when
    image: sabc-compliance-backend  # requirements.txt changes
    container_name: sabc-backend
    restart: unless-stopped
    env_file: .env
    environment:
      PORT:          "3000"
      DB_PATH:       /app/data/platform.db
      SSH_KEY_PATH:  /app/keys/ansible_id_rsa
      ANSIBLE_DIR:   /app/ansible
      PACKAGES_DIR:  /app/packages
      # Address + port nodes use to reach the platform over HTTPS — baked into
      # the bootstrap script's cert-trust step (falls back to request Host).
      PLATFORM_PUBLIC_HOST: "${PLATFORM_PUBLIC_HOST:-}"
      HTTPS_PORT:          "${HTTPS_PORT:-8443}"
    volumes:
      - backend-data:/app/data
      - backend-keys:/app/keys
      - ./backend/packages:/app/packages
      - ./backend/src:/app/src           # live — git pull reflects instantly
      - ./backend/ansible:/app/ansible   # live — playbook edits take effect on next run
      - ./backend/scan-profiles:/app/scan-profiles  # live — bundled scan profile, no rebuild needed
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    networks:
      - sabc-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    command:
      - uvicorn
      - main:app
      - --app-dir
      - /app/src
      - --host
      - 0.0.0.0
      - --port
      - "3000"
      - --reload     # restarts automatically on any .py file change

  # ── Frontend: Vite dev server (HTTPS) ──────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: sabc-frontend
    working_dir: /app
    environment:
      # Extra subjectAltName hosts for the dev self-signed cert (comma/space
      # separated) so HTTPS is valid for the public IP, not just localhost.
      TLS_SAN: "${PLATFORM_PUBLIC_HOST:-}"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules   # kept inside container so
                                                  # host & container binaries
                                                  # don't conflict (ARM/x86)
      - frontend-certs:/certs                      # self-signed TLS cert (persisted)
    # Generate a self-signed cert on first launch (vite.config.js serves HTTPS
    # when /certs/server.crt exists), then start the dev server.
    command: sh /app/dev-entrypoint.sh
    ports:
      # Defaults to 8443 so it never collides with a standard :443 service on
      # the host. Override via HTTPS_PORT in .env.
      - "${HTTPS_PORT:-8443}:5173"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sabc-net
    # Vite proxies /api → backend:3000 (configured in vite.config.js),
    # including WebSocket job-log streaming — same behaviour as Nginx in prod.

volumes:
  backend-data:
  backend-keys:
  frontend-node-modules:    # isolated node_modules volume (not on the host)
  frontend-certs:           # self-signed TLS cert (persisted across restarts)

networks:
  sabc-net:
    driver: bridge
