server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA — all unknown paths return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API — strip /api prefix, forward to backend container
    location /api/ {
        proxy_pass         http://backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Long timeout — Ansible jobs can run for 15+ minutes
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    # WebSocket — job log streaming (/api/jobs/<id>/ws)
    location ~ ^/api/jobs/[^/]+/ws$ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;

        # Rewrite /api/jobs/<id>/ws → /jobs/<id>/ws
        rewrite ^/api(.*)$ $1 break;
    }
}
