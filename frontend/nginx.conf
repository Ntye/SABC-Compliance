# Redirect all plain HTTP to HTTPS (assumes standard ports 80 → 443).
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # Self-signed certificate generated on first launch by tls-entrypoint.sh.
    # Replace the files in the frontend-certs volume with a CA-signed pair to
    # remove the browser warning — no other change required.
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA — all unknown paths return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API — strip /api prefix, forward to backend container
    location /api/ {
        proxy_pass         http://backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        # Long timeout — Ansible jobs can run for 15+ minutes
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    # WebSocket — job log streaming (/api/jobs/<id>/ws)
    location ~ ^/api/jobs/[^/]+/ws$ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;

        # Rewrite /api/jobs/<id>/ws → /jobs/<id>/ws
        rewrite ^/api(.*)$ $1 break;
    }
}
