services:

  # ── Backend: FastAPI + Ansible ────────────────────────────────────────────
  backend:
    build: ./backend
    image: sabc-compliance-backend
    container_name: sabc-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT:          "3000"
      DB_PATH:       /app/data/platform.db
      SSH_KEY_PATH:  /app/keys/ansible_id_rsa
      ANSIBLE_DIR:   /app/ansible
      PACKAGES_DIR:  /app/packages
      # Optional: set to the host machine's LAN IP so "Register this machine"
      # works on the Add VM page without manual typing.
      # If blank the backend auto-detects via host.docker.internal.
      HOST_IP:         "${HOST_IP:-}"
      # Optional: SSH admin user on the host (default: root).
      # Set to e.g. ubuntu, debian, or your personal user if that's how
      # you SSH into this machine.
      HOST_ADMIN_USER: "${HOST_ADMIN_USER:-}"
      # Address + port nodes use to reach the platform over HTTPS. Baked into
      # the node bootstrap script's cert-trust step so registered nodes trust
      # the platform's TLS cert (HTTPS without -k). When PLATFORM_PUBLIC_HOST
      # is unset the bootstrap endpoint falls back to the request Host header.
      PLATFORM_PUBLIC_HOST: "${PLATFORM_PUBLIC_HOST:-}"
      HTTPS_PORT:          "${HTTPS_PORT:-8443}"
      # Directory of the frontend's TLS cert/key, shared via the frontend-certs
      # volume. Lets an admin install a CA-signed cert from the UI; the frontend
      # watches this dir and reloads nginx automatically. See routes/settings.py.
      TLS_CERTS_DIR:       /app/certs
    extra_hosts:
      # Makes host.docker.internal resolve to the Docker host on Linux.
      # Used for auto-detecting the platform host IP.
      - "host.docker.internal:host-gateway"
    volumes:
      # Database — survives container replacement
      - backend-data:/app/data
      # SSH key pair — generated once on first start, reused on updates
      - backend-keys:/app/keys
      # Airgap packages — bind-mount so you can drop files in without rebuild
      - ./backend/packages:/app/packages
      # Frontend TLS cert/key — same named volume the frontend serves from, so
      # a cert uploaded via the UI lands where nginx reads it.
      - frontend-certs:/app/certs
    networks:
      - sabc-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
    # Backend exposed on BACKEND_PORT (default 3000) for direct API access
    # and Swagger UI at http://localhost:3000/docs. The frontend Nginx proxy
    # at /api/ remains the primary path used by the browser.
    ports:
      - "${BACKEND_PORT:-3000}:3000"

  # ── Frontend: React → Nginx ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # Tells the React bundle to send API calls to /api/ (proxied by Nginx)
        VITE_API_BASE: /api
    image: sabc-compliance-frontend
    container_name: sabc-frontend
    restart: unless-stopped
    environment:
      # Extra subjectAltName hosts for the auto-generated self-signed cert, so
      # HTTPS is valid for the address nodes use (e.g. the public IP) — not just
      # localhost. Comma/space separated. The self-signed cert is regenerated
      # if it doesn't already cover these hosts (a CA-signed cert you drop in is
      # left untouched). See frontend/tls-entrypoint.sh.
      TLS_SAN: "${PLATFORM_PUBLIC_HOST:-}"
    ports:
      # HTTPS (primary, and the only published port). A self-signed cert is
      # generated on first launch. Defaults to 8443 so it never collides with a
      # standard :443 service already running on the host. Override via
      # HTTPS_PORT in .env. The container still serves nginx on 443 internally;
      # only the host-side published port changes.
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      # TLS cert/key persist here. Replace with a CA-signed pair to drop the
      # browser warning — see frontend/tls-entrypoint.sh.
      - frontend-certs:/etc/nginx/certs
    depends_on:
      backend:
        condition: service_started
    networks:
      - sabc-net

volumes:
  backend-data:
  backend-keys:
  frontend-certs:

networks:
  sabc-net:
    driver: bridge
