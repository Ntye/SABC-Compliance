services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sabc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       "${POSTGRES_DB:-sabc}"
      POSTGRES_USER:     "${POSTGRES_USER:-sabc}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-sabc-change-me}"
    volumes:
      # Database files persist across container replacements.
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sabc-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sabc} -d ${POSTGRES_DB:-sabc}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Backend: FastAPI + Ansible ────────────────────────────────────────────
  backend:
    image: sabc-compliance-backend
    container_name: sabc-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT:          "3000"
      DB_PATH:       /app/data/platform.db
      SSH_KEY_PATH:  /app/keys/ansible_id_rsa
      ANSIBLE_DIR:   /app/ansible
      PACKAGES_DIR:  /app/packages
      # PostgreSQL DSN — when set the backend uses PostgreSQL instead of SQLite.
      # Build from the POSTGRES_* vars so the password is only defined once.
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-sabc}:${POSTGRES_PASSWORD:-sabc-change-me}@postgres:5432/${POSTGRES_DB:-sabc}"
      # Optional: set to the host machine's LAN IP so "Register this machine"
      # works on the Add VM page without manual typing.
      # If blank the backend auto-detects via host.docker.internal.
      HOST_IP:         "${HOST_IP:-}"
      # Optional: SSH admin user on the host (default: root).
      HOST_ADMIN_USER: "${HOST_ADMIN_USER:-}"
      # Address + port nodes use to reach the platform over HTTPS.
      PLATFORM_PUBLIC_HOST: "${PLATFORM_PUBLIC_HOST:-}"
      HTTPS_PORT:          "${HTTPS_PORT:-8443}"
      # Frontend TLS cert dir shared via the frontend-certs volume.
      TLS_CERTS_DIR:       /app/certs
      # Offline AI assistant — reach the bundled Ollama service over the internal
      # network. The model is baked into the sabc-ollama image (no internet).
      OLLAMA_URL:   "http://ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.2:1b}"
    extra_hosts:
      # Makes host.docker.internal resolve to the Docker host on Linux.
      - "host.docker.internal:host-gateway"
    volumes:
      # SQLite file kept here so the migration script can read it.
      - backend-data:/app/data
      # SSH key pair — generated once on first start, reused on updates.
      - backend-keys:/app/keys
      # Airgap packages — bind-mount so you can drop files in without rebuild.
      - ./backend/packages:/app/packages
      # Frontend TLS cert/key — same volume the frontend serves from.
      - frontend-certs:/app/certs
    depends_on:
      - postgres
    networks:
      - sabc-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
    ports:
      - "${BACKEND_PORT:-3000}:3000"

  # ── Ollama: offline AI assistant ─────────────────────────────────────────────
  # Uses the stock ollama/ollama image; model weights live in the ollama-models
  # named volume, loaded by ship.sh --with-ai or --ai-models (or manually via
  # deploy/get-model.sh). Behind the "ai" profile so the stack starts cleanly
  # when no model has been transferred — the chat widget degrades gracefully.
  ollama:
    image: ollama/ollama:latest
    container_name: sabc-ollama
    profiles: ["ai"]
    restart: unless-stopped
    networks:
      - sabc-net
    volumes:
      - ollama-models:/root/.ollama
    # Not published to the host — only the backend talks to it over sabc-net.
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend: React → Nginx ───────────────────────────────────────────────
  frontend:
    image: sabc-compliance-frontend
    container_name: sabc-frontend
    restart: unless-stopped
    environment:
      TLS_SAN: "${PLATFORM_PUBLIC_HOST:-}"
    ports:
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - frontend-certs:/etc/nginx/certs
    depends_on:
      - backend
    networks:
      - sabc-net

volumes:
  postgres-data:
  backend-data:
  backend-keys:
  frontend-certs:
  ollama-models:

networks:
  sabc-net:
    driver: bridge
