---
- name: Baseline Provisioning
  hosts: target
  become: yes
  gather_facts: no

  vars:
    baseline_packages_debian:
      - curl
      - git
      - vim
      - net-tools
      - ca-certificates
      - gnupg
      - lsb-release
      - chrony
      - rsyslog
    baseline_packages_redhat:
      - curl
      - git
      - vim
      - net-tools
      - ca-certificates
      - gnupg2
      - chrony
      - rsyslog

  # ── Bootstrap: ensure Python exists before gathering facts ────────────────
  # Minimal/cloud base images (fresh Ubuntu, Debian, RHEL, Rocky) may ship
  # without python3, which Ansible fact-gathering and most modules require.
  # The raw module runs over plain SSH with NO Python dependency — use it to
  # install Python first, then gather facts manually.
  pre_tasks:
    - name: Bootstrap Python interpreter (raw SSH, no facts required)
      raw: |
        if command -v python3 >/dev/null 2>&1; then exit 0; fi
        echo "BOOTSTRAP: python3 not found, installing"
        if command -v apt-get >/dev/null 2>&1; then
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -y && apt-get install -y python3
        elif command -v dnf >/dev/null 2>&1; then
          dnf install -y python3
        elif command -v yum >/dev/null 2>&1; then
          yum install -y python3
        elif command -v zypper >/dev/null 2>&1; then
          zypper --non-interactive install python3
        else
          echo "BOOTSTRAP ERROR: no supported package manager (apt/dnf/yum/zypper)" >&2
          exit 1
        fi
      become: yes
      register: python_bootstrap
      changed_when: "'installing' in python_bootstrap.stdout"

    - name: Gather facts now that Python is available
      setup:

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == 'Debian'

    - name: Update yum cache
      yum:
        update_cache: yes
      when: ansible_os_family == 'RedHat'

    - name: Install baseline packages (Debian/Ubuntu)
      apt:
        name: "{{ baseline_packages_debian }}"
        state: present
      when: ansible_os_family == 'Debian'

    - name: Install baseline packages (RedHat/Rocky)
      yum:
        name: "{{ baseline_packages_redhat }}"
        state: present
      when: ansible_os_family == 'RedHat'

    - name: Enable and start chrony (NTP)
      service:
        name: "{{ 'chrony' if ansible_os_family == 'Debian' else 'chronyd' }}"
        state: started
        enabled: yes

    - name: Enable and start rsyslog
      service:
        name: rsyslog
        state: started
        enabled: yes

    - name: SSH hardening - prohibit root password login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin prohibit-password'
        backup: yes
      notify: restart sshd

    - name: SSH hardening - disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: restart sshd

    - name: SSH hardening - limit max auth attempts
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?MaxAuthTries'
        line: 'MaxAuthTries 3'
      notify: restart sshd

    - name: SSH hardening - disable X11 forwarding
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?X11Forwarding'
        line: 'X11Forwarding no'
      notify: restart sshd

    - name: Apply kernel security parameters
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/99-sabc-security.conf
        reload: yes
      loop:
        - { name: 'net.ipv4.ip_forward',                   value: '0' }
        - { name: 'net.ipv4.conf.all.send_redirects',       value: '0' }
        - { name: 'net.ipv4.conf.default.send_redirects',   value: '0' }
        - { name: 'net.ipv4.conf.all.accept_redirects',     value: '0' }
        - { name: 'net.ipv4.conf.default.accept_redirects', value: '0' }
        - { name: 'net.ipv4.icmp_echo_ignore_broadcasts',   value: '1' }
        - { name: 'net.ipv4.tcp_syncookies',                value: '1' }
        - { name: 'kernel.dmesg_restrict',                  value: '1' }
        - { name: 'fs.suid_dumpable',                       value: '0' }

  handlers:
    - name: restart sshd
      service:
        name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
        state: restarted
