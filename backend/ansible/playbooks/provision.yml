---
- name: Baseline Provisioning
  hosts: target
  become: yes
  gather_facts: no

  vars:
    baseline_packages_debian:
      - curl
      - git
      - vim
      - net-tools
      - ca-certificates
      - gnupg
      - lsb-release
      - chrony
      - rsyslog
    baseline_packages_redhat:
      - curl
      - git
      - vim
      - net-tools
      - ca-certificates
      - gnupg2
      - chrony
      - rsyslog

  # ── Bootstrap: ensure a MODERN Python (>=3.8) before gathering facts ───────
  # Fresh/minimal cloud images may ship without python3 at all, OR with a
  # version too old for modern Ansible — e.g. Amazon Linux 2 / RHEL 7 default
  # to python3.6, which fails on "from __future__ import annotations" (needs
  # >=3.7) and on ansible-core modules (need >=3.8). The raw module runs over
  # plain SSH with NO Python dependency: use it to install/locate a suitable
  # interpreter, then pin ansible_python_interpreter to it before setup runs.
  pre_tasks:
    - name: Bootstrap a suitable Python interpreter (raw SSH, no facts)
      raw: |
        # Echo the first python on PATH whose version is >= 3.8, else nothing
        find_py() {
          for p in python3.13 python3.12 python3.11 python3.10 python3.9 python3.8 python3; do
            if command -v "$p" >/dev/null 2>&1; then
              v=$("$p" -c 'import sys;print(sys.version_info[0]*100+sys.version_info[1])' 2>/dev/null || echo 0)
              if [ "$v" -ge 308 ]; then command -v "$p"; return 0; fi
            fi
          done
          return 1
        }
        if P=$(find_py); then echo "PYINTERP=$P"; exit 0; fi
        echo "BOOTSTRAP: installing a modern python3 (>=3.8)" >&2
        if command -v apt-get >/dev/null 2>&1; then
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -y || true
          apt-get install -y python3 || true
          find_py >/dev/null 2>&1 || apt-get install -y python3.8 || true
        elif command -v dnf >/dev/null 2>&1; then
          dnf install -y python3 || true
        elif command -v yum >/dev/null 2>&1; then
          # Amazon Linux 2 / RHEL 7 / CentOS 7: default python3 is 3.6 — pull 3.8
          yum install -y python38 \
            || amazon-linux-extras install -y python3.8 \
            || { amazon-linux-extras enable python3.8 && yum clean metadata && yum install -y python38; } \
            || yum install -y python3 \
            || true
        elif command -v zypper >/dev/null 2>&1; then
          zypper --non-interactive install python3 || true
        fi
        if P=$(find_py); then echo "PYINTERP=$P"; exit 0; fi
        echo "BOOTSTRAP ERROR: could not provide python >= 3.8 on target" >&2
        exit 1
      become: yes
      register: python_bootstrap
      changed_when: "'installing a modern' in (python_bootstrap.stderr | default(''))"

    - name: Pin ansible_python_interpreter to the bootstrapped interpreter
      set_fact:
        ansible_python_interpreter: "{{ python_bootstrap.stdout | regex_findall('PYINTERP=(\\S+)') | first }}"
      when: python_bootstrap.stdout is search('PYINTERP=')

    - name: Gather facts now that a suitable Python is available
      setup:

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == 'Debian'

    - name: Update yum cache
      yum:
        update_cache: yes
      when: ansible_os_family == 'RedHat'

    - name: Install baseline packages (Debian/Ubuntu)
      apt:
        name: "{{ baseline_packages_debian }}"
        state: present
      when: ansible_os_family == 'Debian'

    - name: Install baseline packages (RedHat/Rocky)
      yum:
        name: "{{ baseline_packages_redhat }}"
        state: present
      when: ansible_os_family == 'RedHat'

    - name: Enable and start chrony (NTP)
      service:
        name: "{{ 'chrony' if ansible_os_family == 'Debian' else 'chronyd' }}"
        state: started
        enabled: yes

    - name: Enable and start rsyslog
      service:
        name: rsyslog
        state: started
        enabled: yes

    - name: SSH hardening - prohibit root password login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin prohibit-password'
        backup: yes
      notify: restart sshd

    - name: SSH hardening - disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: restart sshd

    - name: SSH hardening - limit max auth attempts
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?MaxAuthTries'
        line: 'MaxAuthTries 3'
      notify: restart sshd

    - name: SSH hardening - disable X11 forwarding
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?X11Forwarding'
        line: 'X11Forwarding no'
      notify: restart sshd

    - name: Apply kernel security parameters
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/99-sabc-security.conf
        reload: yes
      loop:
        - { name: 'net.ipv4.ip_forward',                   value: '0' }
        - { name: 'net.ipv4.conf.all.send_redirects',       value: '0' }
        - { name: 'net.ipv4.conf.default.send_redirects',   value: '0' }
        - { name: 'net.ipv4.conf.all.accept_redirects',     value: '0' }
        - { name: 'net.ipv4.conf.default.accept_redirects', value: '0' }
        - { name: 'net.ipv4.icmp_echo_ignore_broadcasts',   value: '1' }
        - { name: 'net.ipv4.tcp_syncookies',                value: '1' }
        - { name: 'kernel.dmesg_restrict',                  value: '1' }
        - { name: 'fs.suid_dumpable',                       value: '0' }

  handlers:
    - name: restart sshd
      service:
        name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
        state: restarted
