---
# Deploys Wazuh all-in-one (manager + indexer + dashboard) using Docker images.
#
# ── Requirements ──────────────────────────────────────────────────────────────
# Place the exported Wazuh Docker image tarball in:
#   backend/packages/wazuh-manager/wazuh-docker-images-4.10.4.tar
#
# Export commands (run once on an internet-connected machine):
#
#   docker save \
#     wazuh/wazuh-manager:4.10.4 \
#     wazuh/wazuh-indexer:4.10.4 \
#     wazuh/wazuh-dashboard:4.10.4 \
#     --output backend/packages/wazuh-manager/wazuh-docker-images-4.10.4.tar
#
# ── What this playbook does ───────────────────────────────────────────────────
# 1. Installs Docker + Docker Compose plugin on the target if not present
# 2. Transfers the image tarball from the platform server to the target
# 3. Loads all three images into the target's Docker daemon
# 4. Generates self-signed TLS certificates for the Wazuh stack
# 5. Deploys the stack with docker compose
#
- name: Deploy Wazuh (Docker-based, airgap)
  hosts: target
  become: yes
  gather_facts: no

  vars:
    wazuh_version: "4.10.4"
    wazuh_deploy_dir: /opt/wazuh
    # packages_dir is injected by AnsibleAdapter (absolute path to backend/packages/)
    wazuh_pkg_dir: "{{ packages_dir }}/wazuh-manager"
    wazuh_image_tar: "wazuh-docker-images-{{ wazuh_version }}.tar"
    wazuh_api_port: 55000
    wazuh_manager_port: 1514
    wazuh_auth_port: 1515
    wazuh_dashboard_port: 443

  # ── Bootstrap: ensure a MODERN Python (>=3.8) before gathering facts ───────
  # Fresh/minimal cloud images may ship without python3 at all, OR with a
  # version too old for modern Ansible — e.g. Amazon Linux 2 / RHEL 7 default
  # to python3.6, which fails on "from __future__ import annotations" (needs
  # >=3.7) and on ansible-core modules (need >=3.8). The raw module runs over
  # plain SSH with NO Python dependency: use it to install/locate a suitable
  # interpreter, then pin ansible_python_interpreter to it before setup runs.
  pre_tasks:
    - name: Bootstrap a suitable Python interpreter (raw SSH, no facts)
      raw: |
        # Echo the first python on PATH whose version is >= 3.8, else nothing
        find_py() {
          for p in python3.13 python3.12 python3.11 python3.10 python3.9 python3.8 python3; do
            if command -v "$p" >/dev/null 2>&1; then
              v=$("$p" -c 'import sys;print(sys.version_info[0]*100+sys.version_info[1])' 2>/dev/null || echo 0)
              if [ "$v" -ge 308 ]; then command -v "$p"; return 0; fi
            fi
          done
          return 1
        }
        if P=$(find_py); then echo "PYINTERP=$P"; exit 0; fi
        echo "BOOTSTRAP: installing a modern python3 (>=3.8)" >&2
        if command -v apt-get >/dev/null 2>&1; then
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -y || true
          apt-get install -y python3 || true
          find_py >/dev/null 2>&1 || apt-get install -y python3.8 || true
        elif command -v dnf >/dev/null 2>&1; then
          dnf install -y python3 || true
        elif command -v yum >/dev/null 2>&1; then
          # Amazon Linux 2 / RHEL 7 / CentOS 7: default python3 is 3.6 — pull 3.8
          yum install -y python38 \
            || amazon-linux-extras install -y python3.8 \
            || { amazon-linux-extras enable python3.8 && yum clean metadata && yum install -y python38; } \
            || yum install -y python3 \
            || true
        elif command -v zypper >/dev/null 2>&1; then
          zypper --non-interactive install python3 || true
        fi
        if P=$(find_py); then echo "PYINTERP=$P"; exit 0; fi
        echo "BOOTSTRAP ERROR: could not provide python >= 3.8 on target" >&2
        exit 1
      become: yes
      register: python_bootstrap
      changed_when: "'installing a modern' in (python_bootstrap.stderr | default(''))"

    - name: Pin ansible_python_interpreter to the bootstrapped interpreter
      set_fact:
        ansible_python_interpreter: "{{ python_bootstrap.stdout | regex_findall('PYINTERP=(\\S+)') | first }}"
      when: python_bootstrap.stdout is search('PYINTERP=')

    - name: Gather facts now that a suitable Python is available
      setup:

  tasks:

    # ── Preflight checks ──────────────────────────────────────────────────────
    - name: Check for Wazuh image tarball on controller
      stat:
        path: "{{ wazuh_pkg_dir }}/{{ wazuh_image_tar }}"
      register: image_tar
      delegate_to: localhost
      become: no

    - name: Abort — image tarball not found
      fail:
        msg: >-
          Wazuh Docker image tarball not found at
          {{ wazuh_pkg_dir }}/{{ wazuh_image_tar }}.
          Export it first:
            docker save
              wazuh/wazuh-manager:{{ wazuh_version }}
              wazuh/wazuh-indexer:{{ wazuh_version }}
              wazuh/wazuh-dashboard:{{ wazuh_version }}
              --output backend/packages/wazuh-manager/{{ wazuh_image_tar }}
      when: not image_tar.stat.exists

    - name: Preflight — warn on low memory
      debug:
        msg: >-
          WARNING: {{ ansible_fqdn }} has {{ ansible_memtotal_mb }} MB RAM.
          The Wazuh stack needs ~4096 MB minimum (8192 MB recommended).
      when: ansible_memtotal_mb < 4096

    - name: Preflight — check free disk on /
      shell: df -BG --output=avail / | tail -1 | tr -d 'G '
      register: root_free_gb
      changed_when: false
      failed_when: false

    - name: Preflight — warn on low disk
      debug:
        msg: "WARNING: only {{ root_free_gb.stdout | trim }} GB free on /. Need ~20 GB+."
      when:
        - root_free_gb.stdout | trim | length > 0
        - (root_free_gb.stdout | trim | int) < 20

    - name: Check if Wazuh stack is already running
      shell: docker compose -f {{ wazuh_deploy_dir }}/docker-compose.yml ps -q 2>/dev/null | wc -l
      register: wazuh_running
      changed_when: false
      failed_when: false

    # ── Install Docker if needed ──────────────────────────────────────────────
    - name: Check if Docker is installed
      command: docker --version
      register: docker_check
      changed_when: false
      failed_when: false

    - name: Install Docker (Debian/Ubuntu)
      block:
        - name: Install Docker prerequisites
          apt:
            name: [ca-certificates, curl, gnupg]
            state: present
            update_cache: yes

        - name: Add Docker GPG key
          shell: |
            install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg \
              | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
            chmod a+r /etc/apt/keyrings/docker.gpg
          args:
            creates: /etc/apt/keyrings/docker.gpg

        - name: Add Docker APT repository
          shell: |
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
              https://download.docker.com/linux/{{ ansible_distribution | lower }} \
              $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
              > /etc/apt/sources.list.d/docker.list
          args:
            creates: /etc/apt/sources.list.d/docker.list

        - name: Install Docker engine
          apt:
            name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
            state: present
            update_cache: yes
      when:
        - docker_check.rc != 0
        - ansible_os_family == 'Debian'

    - name: Install Docker (RHEL/Rocky/CentOS)
      block:
        - name: Install Docker via yum-utils
          yum:
            name: yum-utils
            state: present

        - name: Add Docker CE repository
          command: yum-config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
          args:
            creates: /etc/yum.repos.d/docker-ce.repo

        - name: Install Docker engine
          yum:
            name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
            state: present

        - name: Start and enable Docker
          service:
            name: docker
            state: started
            enabled: yes
      when:
        - docker_check.rc != 0
        - ansible_os_family == 'RedHat'

    - name: Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: yes

    # ── Transfer and load images ──────────────────────────────────────────────
    - name: Check if Wazuh images are already loaded
      shell: docker image inspect wazuh/wazuh-manager:{{ wazuh_version }} 2>/dev/null && echo "exists" || echo "missing"
      register: images_loaded
      changed_when: false

    - name: Create temp dir on target
      tempfile:
        state: directory
        prefix: wazuh_images_
      register: tmp_dir
      when: images_loaded.stdout == "missing"

    - name: Transfer Wazuh image tarball to target (this may take several minutes)
      copy:
        src: "{{ wazuh_pkg_dir }}/{{ wazuh_image_tar }}"
        dest: "{{ tmp_dir.path }}/{{ wazuh_image_tar }}"
      when: images_loaded.stdout == "missing"

    - name: Load Wazuh Docker images
      shell: docker load -i {{ tmp_dir.path }}/{{ wazuh_image_tar }}
      register: docker_load
      when: images_loaded.stdout == "missing"

    - name: Debug image load output
      debug:
        msg: "{{ docker_load.stdout_lines }}"
      when:
        - images_loaded.stdout == "missing"
        - docker_load is defined

    - name: Remove temp tarball from target
      file:
        path: "{{ tmp_dir.path }}"
        state: absent
      when: images_loaded.stdout == "missing"

    # ── TLS certificates ──────────────────────────────────────────────────────
    - name: Create Wazuh deploy and cert directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0750'
      loop:
        - "{{ wazuh_deploy_dir }}"
        - /etc/ssl/wazuh

    - name: Generate self-signed CA
      shell: |
        openssl req -x509 -newkey rsa:4096 -keyout /etc/ssl/wazuh/root-ca.key \
          -out /etc/ssl/wazuh/root-ca.pem -days 3650 -nodes \
          -subj "/C=CM/O=SABC/CN=wazuh-ca"
      args:
        creates: /etc/ssl/wazuh/root-ca.pem

    - name: Generate indexer certificate
      shell: |
        openssl req -newkey rsa:4096 -keyout /etc/ssl/wazuh/wazuh-indexer.key \
          -out /etc/ssl/wazuh/wazuh-indexer.csr -nodes \
          -subj "/C=CM/O=SABC/CN=wazuh-indexer"
        openssl x509 -req -in /etc/ssl/wazuh/wazuh-indexer.csr \
          -CA /etc/ssl/wazuh/root-ca.pem -CAkey /etc/ssl/wazuh/root-ca.key \
          -CAcreateserial -out /etc/ssl/wazuh/wazuh-indexer.pem -days 3650 -sha256
      args:
        creates: /etc/ssl/wazuh/wazuh-indexer.pem

    - name: Generate filebeat (manager→indexer) certificate
      shell: |
        openssl req -newkey rsa:4096 -keyout /etc/ssl/wazuh/filebeat.key \
          -out /etc/ssl/wazuh/filebeat.csr -nodes \
          -subj "/C=CM/O=SABC/CN=wazuh-manager"
        openssl x509 -req -in /etc/ssl/wazuh/filebeat.csr \
          -CA /etc/ssl/wazuh/root-ca.pem -CAkey /etc/ssl/wazuh/root-ca.key \
          -CAcreateserial -out /etc/ssl/wazuh/filebeat.pem -days 3650 -sha256
      args:
        creates: /etc/ssl/wazuh/filebeat.pem

    - name: Generate dashboard certificate
      shell: |
        openssl req -newkey rsa:4096 -keyout /etc/ssl/wazuh/dashboard.key \
          -out /etc/ssl/wazuh/dashboard.csr -nodes \
          -subj "/C=CM/O=SABC/CN=wazuh-dashboard"
        openssl x509 -req -in /etc/ssl/wazuh/dashboard.csr \
          -CA /etc/ssl/wazuh/root-ca.pem -CAkey /etc/ssl/wazuh/root-ca.key \
          -CAcreateserial -out /etc/ssl/wazuh/dashboard.pem -days 3650 -sha256
      args:
        creates: /etc/ssl/wazuh/dashboard.pem

    - name: Fix certificate permissions
      file:
        path: /etc/ssl/wazuh
        owner: root
        group: root
        mode: '0640'
        recurse: yes

    # ── Deploy docker-compose stack ───────────────────────────────────────────
    - name: Write docker-compose.yml for Wazuh stack
      template:
        src: wazuh-compose.yml.j2
        dest: "{{ wazuh_deploy_dir }}/docker-compose.yml"
        mode: '0640'

    - name: Start Wazuh stack
      shell: docker compose -f {{ wazuh_deploy_dir }}/docker-compose.yml up -d
      args:
        chdir: "{{ wazuh_deploy_dir }}"
      register: compose_up

    - name: Wait for Wazuh API to be ready (port {{ wazuh_api_port }})
      wait_for:
        host: 127.0.0.1
        port: "{{ wazuh_api_port }}"
        timeout: 180
        delay: 10

    # ── Firewall ──────────────────────────────────────────────────────────────
    - name: Allow Wazuh ports (ufw, Debian)
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
        comment: "Wazuh"
      loop:
        - "{{ wazuh_manager_port }}"
        - "{{ wazuh_auth_port }}"
        - "{{ wazuh_api_port }}"
        - "{{ wazuh_dashboard_port }}"
      when: ansible_os_family == 'Debian'
      ignore_errors: yes

    - name: Allow Wazuh ports (firewalld, RedHat)
      firewalld:
        port: "{{ item }}/tcp"
        permanent: yes
        state: enabled
        immediate: yes
      loop:
        - "{{ wazuh_manager_port }}"
        - "{{ wazuh_auth_port }}"
        - "{{ wazuh_api_port }}"
        - "{{ wazuh_dashboard_port }}"
      when: ansible_os_family == 'RedHat'
      ignore_errors: yes

    # ── Summary ───────────────────────────────────────────────────────────────
    - name: Wazuh Docker stack ready
      debug:
        msg:
          - "Wazuh {{ wazuh_version }} deployed via Docker on {{ ansible_fqdn }}"
          - "Dashboard: https://{{ ansible_default_ipv4.address }}:{{ wazuh_dashboard_port }}"
          - "API:       https://{{ ansible_default_ipv4.address }}:{{ wazuh_api_port }}"
          - "Credentials: admin / SecretPassword"
          - "Agent enrollment: {{ ansible_default_ipv4.address }}:{{ wazuh_auth_port }}/tcp"
          - ""
          - "Manage the stack on the target:"
          - "  docker compose -f {{ wazuh_deploy_dir }}/docker-compose.yml ps"
          - "  docker compose -f {{ wazuh_deploy_dir }}/docker-compose.yml logs -f"
