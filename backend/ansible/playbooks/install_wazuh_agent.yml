---
# Installs Wazuh Agent 4.x and registers it with the manager.
#
# Detects OS family, then delegates to the appropriate platform script:
#   Debian/Ubuntu  → install_wazuh_agent_deb.yml
#   RedHat/CentOS  → install_wazuh_agent_rpm.yml
#
# wazuh_manager_host is injected from platform config.
#
# ── Airgap / offline mode ─────────────────────────────────────────────────────
# Place matching packages in backend/packages/wazuh-agent/ before running:
#   wazuh-agent_4.x.x-1_amd64.deb    (Debian/Ubuntu)
#   wazuh-agent-4.x.x-1.x86_64.rpm   (RHEL/CentOS/Rocky)
#
- name: Install Wazuh Agent
  hosts: target
  become: yes
  gather_facts: no

  vars:
    wazuh_manager: "{{ wazuh_manager_host | default('wazuh') }}"
    wazuh_agent_group: "default"
    # packages_dir is injected by AnsibleAdapter
    agent_pkg_dir: "{{ packages_dir }}/wazuh-agent"

  # ── Bootstrap: ensure a MODERN Python (>=3.8) before gathering facts ───────
  # Fresh/minimal cloud images may ship without python3 at all, OR with a
  # version too old for modern Ansible — e.g. Amazon Linux 2 / RHEL 7 default
  # to python3.6, which fails on "from __future__ import annotations" (needs
  # >=3.7) and on ansible-core modules (need >=3.8). The raw module runs over
  # plain SSH with NO Python dependency: use it to install/locate a suitable
  # interpreter, then pin ansible_python_interpreter to it before setup runs.
  pre_tasks:
    - name: Bootstrap a suitable Python interpreter (raw SSH, no facts)
      raw: |
        # Echo the first python on PATH whose version is >= 3.8, else nothing
        find_py() {
          for p in python3.13 python3.12 python3.11 python3.10 python3.9 python3.8 python3; do
            if command -v "$p" >/dev/null 2>&1; then
              v=$("$p" -c 'import sys;print(sys.version_info[0]*100+sys.version_info[1])' 2>/dev/null || echo 0)
              if [ "$v" -ge 308 ]; then command -v "$p"; return 0; fi
            fi
          done
          return 1
        }
        if P=$(find_py); then echo "PYINTERP=$P"; exit 0; fi
        echo "BOOTSTRAP: installing a modern python3 (>=3.8)" >&2
        if command -v apt-get >/dev/null 2>&1; then
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -y || true
          apt-get install -y python3 || true
          find_py >/dev/null 2>&1 || apt-get install -y python3.8 || true
        elif command -v dnf >/dev/null 2>&1; then
          dnf install -y python3 || true
        elif command -v yum >/dev/null 2>&1; then
          # Amazon Linux 2 / RHEL 7 / CentOS 7: default python3 is 3.6 — pull 3.8
          yum install -y python38 \
            || amazon-linux-extras install -y python3.8 \
            || { amazon-linux-extras enable python3.8 && yum clean metadata && yum install -y python38; } \
            || yum install -y python3 \
            || true
        elif command -v zypper >/dev/null 2>&1; then
          zypper --non-interactive install python3 || true
        fi
        if P=$(find_py); then echo "PYINTERP=$P"; exit 0; fi
        echo "BOOTSTRAP ERROR: could not provide python >= 3.8 on target" >&2
        exit 1
      become: yes
      register: python_bootstrap
      changed_when: "'installing a modern' in (python_bootstrap.stderr | default(''))"

    - name: Pin ansible_python_interpreter to the bootstrapped interpreter
      set_fact:
        ansible_python_interpreter: "{{ python_bootstrap.stdout | regex_findall('PYINTERP=(\\S+)') | first }}"
      when: python_bootstrap.stdout is search('PYINTERP=')

    - name: Gather facts now that a suitable Python is available
      setup:

  tasks:

    # ── Idempotency check ─────────────────────────────────────────────────────
    - name: Check if wazuh-agent is already installed
      stat:
        path: /var/ossec/bin/wazuh-agentd
      register: wazuh_agent_installed

    # ── Cleanup: remove any invalid <force> block left by a prior failed run ───
    - name: Clean up any residual force-enrollment block in ossec.conf
      shell: |
        python3 -c "
        import re
        path = '/var/ossec/etc/ossec.conf'
        try:
            conf = open(path).read()
            cleaned = re.sub(r'\s*<force>[\s\S]*?</force>', '', conf)
            if cleaned != conf:
                open(path, 'w').write(cleaned)
                print('cleaned')
            else:
                print('ok')
        except Exception as e:
            print('error: ' + str(e))
        "
      changed_when: false
      failed_when: false
      when: wazuh_agent_installed.stat.exists

    # ── Idempotency: check CURRENT connection state (not just log history) ────
    # grep alone is unreliable — the log retains old "Connected" entries even
    # when the agent is broken/stopped. We require ALL three conditions:
    #   1. wazuh-agentd is currently running
    #   2. client.keys is non-empty (agent has a valid registration key)
    #   3. The LAST relevant log entry is "Connected to the server"
    #      (not an error like "Duplicate agent name" or "Invalid element")
    - name: Check if already-installed agent is currently connected
      shell: |
        RUNNING=$(/var/ossec/bin/wazuh-control status 2>/dev/null | grep -c 'wazuh-agentd is running' || echo 0)
        KEYS=$(test -s /var/ossec/etc/client.keys && echo "1" || echo "0")
        LAST=$(grep -E 'Connected to the server|ERROR.*Unable to add|ERROR.*Duplicate|ERROR.*Invalid element|ERROR.*Exiting' \
               /var/ossec/logs/ossec.log 2>/dev/null | tail -1)
        if [ "$RUNNING" = "1" ] && [ "$KEYS" = "1" ] && echo "$LAST" | grep -q 'Connected to the server'; then
          exit 0
        else
          exit 1
        fi
      register: _agent_already_connected
      changed_when: false
      failed_when: false
      when: wazuh_agent_installed.stat.exists

    - name: Agent already installed and connected — nothing to do
      debug:
        msg: >-
          wazuh-agent is already installed and connected to {{ wazuh_manager }}
          on {{ ansible_fqdn }}. Skipping installation.
      when:
        - wazuh_agent_installed.stat.exists
        - (_agent_already_connected.rc | default(1)) == 0

    - name: End play — agent already enrolled and connected
      meta: end_host
      when:
        - wazuh_agent_installed.stat.exists
        - (_agent_already_connected.rc | default(1)) == 0

    # ── Airgap detection (shared by both platform scripts) ───────────────────
    - name: Find offline Wazuh agent packages on controller
      find:
        paths: "{{ agent_pkg_dir }}"
        patterns:
          - "wazuh-agent*.deb"
          - "wazuh-agent*.rpm"
      register: agent_offline_pkgs
      delegate_to: localhost
      become: no
      failed_when: false

    - name: Set airgap mode
      set_fact:
        wazuh_airgap: "{{ agent_offline_pkgs.files | length > 0 }}"

    # ── OS detection and dispatch ─────────────────────────────────────────────
    - name: Report OS family, install mode, and manager
      debug:
        msg: >-
          Target: {{ ansible_fqdn }}
          ({{ ansible_distribution }} {{ ansible_distribution_version }},
          {{ ansible_os_family }} family).
          Manager: {{ wazuh_manager }}.
          Mode: {{ 'AIRGAP — packages from ' + agent_pkg_dir if wazuh_airgap else 'ONLINE' }}.
          Already installed: {{ wazuh_agent_installed.stat.exists }}.

    - name: Fail on unsupported OS family
      fail:
        msg: >-
          Unsupported OS family '{{ ansible_os_family }}'.
          Supported: Debian (Ubuntu/Debian) and RedHat (RHEL/CentOS/Rocky/AlmaLinux).
      when: ansible_os_family not in ['Debian', 'RedHat']

    # Check internet connectivity before attempting an online install.
    # Lab/VM environments often have internet on the controller but not on
    # managed nodes — detect this early with a clear actionable error.
    - name: Check target internet connectivity to packages.wazuh.com
      shell: >-
        curl -s --connect-timeout 10 --max-time 15
          -o /dev/null -w "%{http_code}"
          https://packages.wazuh.com/key/GPG-KEY-WAZUH
      register: inet_check
      changed_when: false
      failed_when: false
      when:
        - not wazuh_airgap
        - not wazuh_agent_installed.stat.exists

    - name: Show airgap setup instructions (no internet on target)
      debug:
        msg:
          - "╔══════════════════════════════════════════════════════════════╗"
          - "║         WAZUH AGENT — AIRGAP SETUP REQUIRED                 ║"
          - "╚══════════════════════════════════════════════════════════════╝"
          - ""
          - "  The target node cannot reach packages.wazuh.com."
          - "  (curl exit={{ inet_check.rc }}, HTTP={{ inet_check.stdout | default('—') }})"
          - ""
          - "  Download the package matching your manager version on an internet-connected machine."
          - "  Check manager version: /var/ossec/bin/wazuh-control info | grep version"
          - ""
          - "  ── Debian / Ubuntu ──────────────────────────────────────────"
          - "    curl -LO https://packages.wazuh.com/4.x/apt/pool/main/w/wazuh-agent/wazuh-agent_<VERSION>-1_amd64.deb"
          - ""
          - "  ── RHEL / CentOS / Rocky / AlmaLinux ────────────────────────"
          - "    curl -LO https://packages.wazuh.com/4.x/yum/wazuh-agent-<VERSION>-1.x86_64.rpm"
          - ""
          - "  Then copy the file into the platform packages directory:"
          - ""
          - "    cp wazuh-agent*.deb  backend/packages/wazuh-agent/   # Debian"
          - "    cp wazuh-agent*.rpm  backend/packages/wazuh-agent/   # RedHat"
          - ""
          - "  Re-run this job — the playbook detects the file and"
          - "  switches to offline installation automatically."
          - ""
          - "══════════════════════════════════════════════════════════════"
      when:
        - not wazuh_airgap
        - not wazuh_agent_installed.stat.exists
        - inet_check.stdout | default('000') != '200'

    - name: Abort — target has no internet access (see instructions above)
      fail:
        msg: "No internet on target. Follow the airgap instructions printed above, then re-run."
      when:
        - not wazuh_airgap
        - not wazuh_agent_installed.stat.exists
        - inet_check.stdout | default('000') != '200'

    # ══════════════════════════════════════════════════════════════════════════
    # PREFLIGHT — catch the common Wazuh enrollment failure scenarios early
    #   • Time sync     → agent/manager TLS + accurate event timestamps
    #   • Manager DNS   → "Cannot connect to server" from name resolution
    #   • Reachability  → enrollment (1515) + comms (1514) blocked by firewall
    # Policy: time sync best-effort (warn); manager reachability is a hard block.
    # ══════════════════════════════════════════════════════════════════════════
    - name: Ensure time synchronisation (chrony) is installed and running
      block:
        - name: Install chrony for clock sync
          package:
            name: chrony
            state: present
        - name: Enable and start chrony
          service:
            name: "{{ 'chrony' if ansible_os_family == 'Debian' else 'chronyd' }}"
            state: started
            enabled: yes
        - name: Force an immediate clock step (chronyc makestep)
          command: chronyc makestep
          changed_when: false
          failed_when: false
      rescue:
        - name: Warn that time sync could not be configured
          debug:
            msg: >-
              WARNING: could not configure chrony on {{ ansible_fqdn }}. A wrong
              clock can break agent↔manager TLS and skew alert timestamps.

    # Resolve the manager name up front so the connectivity probe below can use
    # it — and so ongoing agent comms work regardless of site DNS.
    - name: Resolve manager hostname to IP on the node
      command: "getent hosts {{ wazuh_manager }}"
      register: manager_resolve
      changed_when: false
      failed_when: false

    - name: Add manager hostname to /etc/hosts if DNS resolution fails
      lineinfile:
        path: /etc/hosts
        line: "{{ wazuh_manager }} {{ wazuh_manager }}"
        regexp: "\\s{{ wazuh_manager | replace('.', '\\.') }}(\\s|$)"
        state: present
      when: manager_resolve.rc != 0

    - name: Preflight — check manager enrollment port 1515 is reachable
      wait_for:
        host: "{{ wazuh_manager }}"
        port: 1515
        timeout: 15
      register: wazuh_1515_check
      ignore_errors: yes

    - name: Preflight — check manager comms port 1514 is reachable
      wait_for:
        host: "{{ wazuh_manager }}"
        port: 1514
        timeout: 15
      register: wazuh_1514_check
      ignore_errors: yes

    - name: Show Wazuh manager connectivity remediation (unreachable)
      debug:
        msg:
          - "╔══════════════════════════════════════════════════════════════╗"
          - "║   WAZUH MANAGER UNREACHABLE — enrollment cannot proceed     ║"
          - "╚══════════════════════════════════════════════════════════════╝"
          - ""
          - "  {{ ansible_fqdn }} cannot reach {{ wazuh_manager }}."
          - "    port 1515 (enrollment): {{ 'BLOCKED' if wazuh_1515_check is failed else 'OK' }}"
          - "    port 1514 (comms):      {{ 'BLOCKED' if wazuh_1514_check is failed else 'OK' }}"
          - ""
          - "  Most likely causes (in order):"
          - "    1. Firewall blocking 1514/1515 TCP between node and manager"
          - "    2. Wrong manager host/IP configured on the Infrastructure page"
          - "    3. wazuh-manager service not running on the manager"
          - "    4. DNS: '{{ wazuh_manager }}' resolves to the wrong address"
          - ""
          - "  Verify from this node once fixed:"
          - "    nc -vz {{ wazuh_manager }} 1515 && nc -vz {{ wazuh_manager }} 1514"
          - ""
      when: wazuh_1515_check is failed or wazuh_1514_check is failed

    - name: Abort — Wazuh manager ports unreachable (see remediation above)
      fail:
        msg: "Cannot reach {{ wazuh_manager }} on 1514/1515. Fix connectivity (see above) and re-run."
      when: wazuh_1515_check is failed or wazuh_1514_check is failed

    - name: Run Debian/Ubuntu installation script
      include_tasks: install_wazuh_agent_deb.yml
      when: ansible_os_family == 'Debian'

    - name: Run RedHat/CentOS/Rocky installation script
      include_tasks: install_wazuh_agent_rpm.yml
      when: ansible_os_family == 'RedHat'

    # ── Common post-install configuration ─────────────────────────────────────
    # Belt-and-suspenders: patch ossec.conf directly in addition to the
    # WAZUH_MANAGER env var that was set during package install.
    - name: Set manager address in ossec.conf
      replace:
        path: /var/ossec/etc/ossec.conf
        regexp: '<address>[^<]*</address>'
        replace: '<address>{{ wazuh_manager }}</address>'
      notify: Restart wazuh-agent

    # ── Service ───────────────────────────────────────────────────────────────
    - name: Enable and start wazuh-agent
      service:
        name: wazuh-agent
        state: started
        enabled: yes

    # ── Verify ────────────────────────────────────────────────────────────────
    - name: Wait for agent to register with manager (up to 30s)
      command: /var/ossec/bin/wazuh-control status
      register: agent_status
      retries: 6
      delay: 5
      until: "'wazuh-agentd is running' in agent_status.stdout"
      changed_when: false
      failed_when: false

    # Confirm the agent actually connected (not just that the daemon is up).
    # "Connected to the server" in ossec.log means enrollment + handshake worked.
    - name: Check whether the agent has connected to the manager
      shell: grep -aq 'Connected to the server' /var/ossec/logs/ossec.log
      register: agent_connected
      changed_when: false
      failed_when: false

    # ══════════════════════════════════════════════════════════════════════════
    # SELF-HEAL — duplicate agent ID recovery (VM clone)
    #
    # A cloned VM carries the source's /var/ossec/etc/client.keys, so the manager
    # sees a duplicate ID and silently drops the connection — the daemon runs but
    # never reaches "Connected to the server". Detected here only; on a healthy
    # fresh enroll this block is skipped. We reset the key and let the agent's
    # auto-enrollment register a brand-new ID, then retry once.
    # ══════════════════════════════════════════════════════════════════════════
    - name: Detect stuck enrollment (daemon up but never connected)
      set_fact:
        wazuh_enroll_stuck: >-
          {{ ('wazuh-agentd is running' not in agent_status.stdout)
             or (agent_connected.rc != 0) }}

    - name: Duplicate/stale agent key detected — re-enrolling
      debug:
        msg: >-
          {{ ansible_fqdn }} did not connect to {{ wazuh_manager }} (typical
          after VM cloning — a duplicate agent ID in client.keys). Resetting the
          key to force a fresh registration.
      when: wazuh_enroll_stuck | bool

    # ── REST API cleanup — delete stale manager entry before key reset ────────
    # The manager keeps the old agent record; clearing only client.keys causes
    # a "Duplicate agent name" rejection on re-enrollment. Deleting via API
    # first lets the agent register cleanly with a fresh ID.
    # Tries WAZUH_API_PASS if set, falls back to the Wazuh default 'wazuh'.
    # If both fail the rescue block warns and the key-reset continues anyway.
    - name: Remove stale agent entry from Wazuh manager via REST API
      when: wazuh_enroll_stuck | bool
      block:
        - name: Authenticate to Wazuh REST API (runs on controller)
          uri:
            url: "http://{{ wazuh_manager }}:{{ wazuh_api_port | default(55000) }}/security/user/authenticate?raw=true"
            method: POST
            url_username: "{{ wazuh_api_user | default('wazuh') }}"
            url_password: "{{ wazuh_api_pass | default('wazuh') }}"
            force_basic_auth: yes
            return_content: yes
            validate_certs: no
            timeout: 10
          register: _wazuh_jwt
          no_log: true
          delegate_to: localhost
          become: no

        - name: Find agents named {{ ansible_hostname }} on the manager
          uri:
            url: "http://{{ wazuh_manager }}:{{ wazuh_api_port | default(55000) }}/agents?name={{ ansible_hostname }}&status=all"
            method: GET
            headers:
              Authorization: "Bearer {{ _wazuh_jwt.content | trim }}"
            validate_certs: no
            return_content: yes
            timeout: 10
          register: _wazuh_stale_agents
          delegate_to: localhost
          become: no

        - name: Build list of stale agent IDs to delete
          set_fact:
            _stale_ids: >-
              {{ _wazuh_stale_agents.json.data.affected_items
                 | map(attribute='id') | list }}
          when: (_wazuh_stale_agents.json.data.affected_items | default([]) | length) > 0

        - name: Delete stale agents from manager (IDs {{ _stale_ids | default([]) | join(', ') }})
          uri:
            url: "http://{{ wazuh_manager }}:{{ wazuh_api_port | default(55000) }}/agents?agents_list={{ _stale_ids | join(',') }}&status=all&older_than=0s"
            method: DELETE
            headers:
              Authorization: "Bearer {{ _wazuh_jwt.content | trim }}"
            validate_certs: no
            return_content: yes
            timeout: 10
          delegate_to: localhost
          become: no
          when:
            - _stale_ids is defined
            - (_stale_ids | length) > 0

      rescue:
        - name: REST API cleanup failed — continuing with client.keys reset only
          debug:
            msg: >-
              WARNING: Could not delete stale Wazuh agent '{{ ansible_hostname }}'
              via the manager REST API. The client.keys reset below will still
              force a new enrollment ID; the manager may briefly show a duplicate
              entry but will resolve once the agent reconnects.

    - name: Stop wazuh-agent before resetting key
      service:
        name: wazuh-agent
        state: stopped
      when: wazuh_enroll_stuck | bool

    - name: Clear stale client.keys so auto-enrollment issues a fresh ID
      copy:
        dest: /var/ossec/etc/client.keys
        content: ""
        owner: root
        group: wazuh
        mode: '0640'
      failed_when: false
      when: wazuh_enroll_stuck | bool

    - name: Fix stale agent_name in ossec.conf to match current hostname
      replace:
        path: /var/ossec/etc/ossec.conf
        regexp: '<agent_name>[^<]*</agent_name>'
        replace: '<agent_name>{{ ansible_hostname }}</agent_name>'
      failed_when: false
      when: wazuh_enroll_stuck | bool

    - name: Start wazuh-agent to trigger fresh auto-enrollment
      service:
        name: wazuh-agent
        state: started
      when: wazuh_enroll_stuck | bool

    - name: Wait for the agent to connect after re-enrollment (up to 90s)
      shell: |
        /var/ossec/bin/wazuh-control status 2>/dev/null | grep -q 'wazuh-agentd is running' && \
        test -s /var/ossec/etc/client.keys && \
        grep -aq 'Connected to the server' /var/ossec/logs/ossec.log
      register: agent_connected_retry
      retries: 18
      delay: 5
      until: agent_connected_retry.rc == 0
      changed_when: false
      failed_when: false
      when: wazuh_enroll_stuck | bool

    - name: Get wazuh-agent version
      command: /var/ossec/bin/wazuh-control info
      register: agent_info
      changed_when: false
      failed_when: false

    - name: Determine final connection state
      set_fact:
        wazuh_connected_final: >-
          {{ (agent_connected_retry.rc == 0) if wazuh_enroll_stuck | bool
             else (agent_connected.rc == 0) }}

    - name: Show ossec.log tail on connection failure (diagnostic)
      shell: tail -30 /var/ossec/logs/ossec.log 2>/dev/null || echo "(log not found)"
      register: ossec_log_tail
      changed_when: false
      failed_when: false
      when: not (wazuh_connected_final | bool)

    - name: Show agent ossec.conf manager section (diagnostic)
      shell: grep -A3 '<server>' /var/ossec/etc/ossec.conf 2>/dev/null || echo "(not found)"
      register: ossec_conf_server
      changed_when: false
      failed_when: false
      when: not (wazuh_connected_final | bool)

    - name: Print connection failure diagnostics
      debug:
        msg:
          - "── /var/ossec/logs/ossec.log (last 30 lines) ─────────────────"
          - "{{ ossec_log_tail.stdout_lines | default([]) | join('\n') }}"
          - ""
          - "── ossec.conf <server> block ──────────────────────────────────"
          - "{{ ossec_conf_server.stdout_lines | default([]) | join('\n') }}"
          - ""
          - "── Manual test from agent node ────────────────────────────────"
          - "  sudo /var/ossec/bin/agent-auth -m {{ wazuh_manager }}"
          - "  sudo /var/ossec/bin/wazuh-control status"
          - "  nc -vz {{ wazuh_manager }} 1515 && nc -vz {{ wazuh_manager }} 1514"
      when: not (wazuh_connected_final | bool)

    - name: Fail if agent never connected to manager
      fail:
        msg: >-
          wazuh-agent installed on {{ ansible_fqdn }} but never connected to
          {{ wazuh_manager }}. See diagnostics above (ossec.log tail + manual
          test commands). Re-run once the issue is resolved.
      when: not (wazuh_connected_final | bool)

    - name: Wazuh Agent ready
      debug:
        msg: >-
          Wazuh Agent installed on {{ ansible_fqdn }}
          ({{ agent_info.stdout_lines | join(' | ') }}).
          Manager: {{ wazuh_manager }}.
          Connection: {{ 'CONNECTED' if wazuh_connected_final | bool else 'NOT yet connected — see warning above' }}.

  # ── Handlers ─────────────────────────────────────────────────────────────────
  handlers:
    - name: Restart wazuh-agent
      service:
        name: wazuh-agent
        state: restarted
